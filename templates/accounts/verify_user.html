{% extends base_template %}
{% block dashboard_content %}
<section class="content-card">
    <div class="content-card__header"><div><h2 class="content-card__title">{{ page_title }}</h2><p class="content-card__hint">Verify users and update roles from one page.</p></div></div>
    <div style="overflow:auto;">
        <table class="dashboard-table">
            <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Verified</th><th>Action</th></tr></thead>
            <tbody>
                {% for profile in users %}
                <tr>
                    <td colspan="5">
                        <form method="post" class="form-grid form-grid--four" style="align-items:end;">
                            {% csrf_token %}
                            <input type="hidden" name="target_user_id" value="{{ profile.id }}">
                            <div class="field-group">
                                <label class="field-label">User</label>
                                <input value="{{ profile.django_user.username }}" disabled>
                            </div>
                            <div class="field-group">
                                <label class="field-label">Email</label>
                                <input value="{{ profile.django_user.email|default:'-' }}" disabled>
                            </div>
                            <div class="field-group">
                                <label class="field-label">Role</label>
                                <select name="role">
                                    {% for role_value, role_label in role_choices %}
                                    <option value="{{ role_value }}" {% if profile.role == role_value %}selected{% endif %}>{{ role_label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="field-group">
                                <label class="field-label">Verified</label>
                                <label><input type="checkbox" name="is_verified" {% if profile.is_verified %}checked{% endif %}> Active</label>
                            </div>
                            <div><button type="submit" class="btn btn-primary">Save</button></div>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
