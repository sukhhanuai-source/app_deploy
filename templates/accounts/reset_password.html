<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#163b46;font-family:Arial,sans-serif}.card-shell{width:min(520px,calc(100% - 24px));padding:32px;border-radius:24px;background:#fff}</style>
</head>
<body>
<div class="card-shell">
    {% if messages %}{% for message in messages %}<div class="alert alert-info">{{ message }}</div>{% endfor %}{% endif %}
    <h1 class="h3 mb-3">Reset Password</h1>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">New Password</label>{{ form.password1 }}</div>
        <div class="mb-3"><label class="form-label">Confirm Password</label>{{ form.password2 }}</div>
        <button type="submit" class="btn btn-primary w-100">Reset Password</button>
    </form>
    <div class="mt-3"><a href="{% url 'login' %}">Back to login</a></div>
</div>
</body>
</html>
