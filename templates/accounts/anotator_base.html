<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Annotator Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% include 'accounts/_role_base_styles.html' %}
</head>
<body>
<div class="dashboard-app">
    <aside class="dashboard-sidebar">
        <div class="dashboard-brand">
            <div class="dashboard-brand__eyebrow">Annotator</div>
            <h2 class="dashboard-brand__title">Task Workspace</h2>
        </div>
        <nav class="dashboard-nav">
            <a href="{% url 'annotator_home' %}" class="dashboard-nav__link {% if current_nav == 'home' %}is-active{% endif %}">Home</a>
            <a href="{% url 'annotator_assigned_tasks' %}" class="dashboard-nav__link {% if current_nav == 'assigned_tasks' %}is-active{% endif %}">Assgined Task</a>
            
        </nav>
    </aside>
    <main class="dashboard-main">
        <div class="dashboard-topbar">
            <div>
                <h1>Hi {{ display_name }}</h1>
                <div class="dashboard-topbar__meta">Annotator workflow dashboard</div>
            </div>
            <a href="{% url 'logout' %}" class="btn btn-primary">Logout</a>
        </div>
        {% if messages %}
        <div class="message-stack">
            {% for message in messages %}
            <div class="message-pill">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        <div class="dashboard-content">
            {% block dashboard_content %}{% endblock %}
        </div>
    </main>
</div>
</body>
</html>
